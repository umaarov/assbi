# ASSBI platform configuration.
# All values have sensible defaults in code; this file overrides them.

database_path: data/assbi.db

detection:
  backend: simulation        # "simulation" (no deps) or "yolo" (needs ML extras)
  model_path: yolov8n.pt     # used when backend = yolo
  confidence: 0.35
  iou: 0.5
  device: null               # e.g. "cpu", "cuda:0"; null = auto

tracking:
  iou_threshold: 0.3
  max_missed: 30
  max_distance: 80.0

crowd:
  moderate: 8
  high: 20
  critical: 40

anomaly:
  window: 90
  threshold: 4.0
  warmup: 30
  min_scale: 1.0            # floor on spread; stops low-count scenes over-firing

chatbot:
  provider: deepseek         # "deepseek"/"openai-compatible" or "none" for rule-based
  model: deepseek-chat
  base_url: https://api.deepseek.com
  api_key_env: DEEPSEEK_API_KEY   # name of the env var holding the key (never inline the key)
  temperature: 0.2

# Privacy / GDPR data-minimisation: anonymise people in the rendered video.
privacy:
  mode: "off"                # "off" | "blur" | "pixelate"
  targets: ["person"]        # object classes to anonymise
  strength: 23               # blur kernel / pixelation coarseness in pixels

# YouTube auth/runtime for live streaming.
youtube:
  cookies_from_browser: chrome  # e.g. "chrome", "edge", "firefox", "brave"
  cookies_file: cookies.txt          # or a path to an exported cookies.txt
  remote_components: ["ejs:github"]   # n-challenge solver scripts (needs Deno)

video:
  width: 640                 # matches the Pattaya Beach Road CCTV stream
  height: 360
  fps: 30.0
  total_frames: 600          # frames generated by the synthetic source
  stride: 1                  # process every Nth frame of a real video
  max_frames: null
  render: false              # write an annotated output video (needs OpenCV)
  output_path: data/output/annotated.mp4

# Virtual counting line drawn on the frame. Vertical line across the roadway
# of the 640x360 Pattaya Beach Road feed: traffic travels left<->right, so it
# cuts the line; pedestrians using the crosswalk cross it too. Verified against
# a real captured frame (data/output/frame_line.jpg).
lines:
  - name: road_crossing
    start: [300, 90]
    end: [300, 320]
