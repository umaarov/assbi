database_path: data/assbi.db
detection:
  backend: yolo
  model_path: runs/assbi/roboflow/weights/best.pt
  confidence: 0.35
  iou: 0.5
  device: null
  classes: ["person"]
  imgsz: 416
tracking:
  iou_threshold: 0.3
  max_missed: 30
  max_distance: 80.0
crowd:
  moderate: 8
  high: 20
  critical: 40
anomaly:
  window: 90
  threshold: 4.0
  warmup: 30
  min_scale: 1.0
chatbot:
  provider: deepseek
  model: deepseek-chat
  base_url: https://api.deepseek.com
  api_key_env: DEEPSEEK_API_KEY
  temperature: 0.2
privacy:
  mode: "off"
  targets: ["person"]
  strength: 23
youtube:
  cookies_from_browser: chrome
  cookies_file: cookies.txt
  remote_components: ["ejs:github"]
video:
  width: 640
  height: 360
  fps: 30.0
  total_frames: 600
  stride: 1
  max_frames: null
  render: false
  output_path: data/output/annotated.mp4
lines:
  - name: lane_crossing
    start: [25, 235]
    end: [210, 235]
  - name: plaza_crossing
    start: [300, 255]
    end: [300, 360]